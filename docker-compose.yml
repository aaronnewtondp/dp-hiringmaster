version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: dp_hms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-hms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hms_password}
      POSTGRES_DB: ${DB_NAME:-dp_hms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hms_user} -d ${DB_NAME:-dp_hms}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dp_hms_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://hms_user:hms_password@dp_hms_db:5432/dp_hms
      GOOGLE_APPLICATION_CREDENTIALS: /app/dp-hiring-master-key.json
      ROLE_INGEST_SECRET: 22fc0ba4d5799b9fcfeb167b36820247264e87780571fa21566ce048d7b69400
      CANDIDATE_INGEST_SECRET: e9ba2e63e3a1167ce31671ee98831a884efc7f7e35986e778e9fce72fea4ed3f
      DRIVE_JD_FOLDER_ID: ${DRIVE_JD_FOLDER_ID:-}
      GOOGLE_DRIVE_IMPERSONATE_EMAIL: ${GOOGLE_DRIVE_IMPERSONATE_EMAIL:-}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-hms_user}
      DB_PASSWORD: ${DB_PASSWORD:-hms_password}
      DB_NAME: ${DB_NAME:-dp_hms}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_to_a_long_random_string}
      JWT_EXPIRES_IN: 24h
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REFRESH_TOKEN: ${GOOGLE_REFRESH_TOKEN:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      HR_EMAIL: ${HR_EMAIL:-aaron.newton@digitalpaani.com}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
      - ./dp-hiring-master-6dc8eabb38a8.json:/app/dp-hiring-master-key.json:ro

volumes:
  postgres_data:
